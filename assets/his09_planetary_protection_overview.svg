<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Planetary protection and astrobiology study map</title>
  <desc id="desc">A visual summary connecting astrobiology, forward protection, backward protection, mission categories, cleanroom controls, and human Mars missions.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .card { fill: #ffffff; stroke: #cbd5df; stroke-width: 2; rx: 12; }
      .title { font: 700 34px Arial, sans-serif; fill: #17202c; }
      .subtitle { font: 700 22px Arial, sans-serif; fill: #17202c; }
      .text { font: 17px Arial, sans-serif; fill: #293647; }
      .small { font: 14px Arial, sans-serif; fill: #506073; }
      .tag { fill: #e9f0f7; stroke: #cbd5df; stroke-width: 1.5; rx: 12; }
      .tagText { font: 700 14px Arial, sans-serif; fill: #293647; }
      .earth { fill: #4f8edb; stroke: #275c9f; stroke-width: 4; }
      .mars { fill: #c96a43; stroke: #803d2c; stroke-width: 4; }
      .moon { fill: #d8dde6; stroke: #9099a8; stroke-width: 4; }
      .arrowBlue { stroke: #2f6fb3; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .arrowRed { stroke: #b14e38; stroke-width: 4; fill: none; marker-end: url(#arrowRed); }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6fb3"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b14e38"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="560"/>
  <text class="title" x="48" y="58">Lecture 9 Study Map: Astrobiology and Planetary Protection</text>
  <text class="small" x="50" y="88">Search for life without corrupting the science or endangering Earth.</text>

  <rect class="card" x="60" y="125" width="310" height="160"/>
  <text class="subtitle" x="90" y="165">Astrobiology</text>
  <text class="text" x="90" y="198">Origin, evolution and</text>
  <text class="text" x="90" y="222">distribution of life</text>
  <rect class="tag" x="90" y="245" width="78" height="30"/>
  <text class="tagText" x="110" y="265">Water</text>
  <rect class="tag" x="178" y="245" width="86" height="30"/>
  <text class="tagText" x="197" y="265">CHNOPS</text>
  <rect class="tag" x="274" y="245" width="64" height="30"/>
  <text class="tagText" x="290" y="265">Energy</text>

  <rect class="card" x="405" y="125" width="310" height="160"/>
  <text class="subtitle" x="435" y="165">Forward Protection</text>
  <circle class="mars" cx="475" cy="222" r="30"/>
  <circle class="moon" cx="540" cy="222" r="24"/>
  <text class="text" x="590" y="208">Protect Mars</text>
  <text class="text" x="590" y="232">and icy moons</text>
  <text class="small" x="435" y="263">Avoid contaminating targets of life science.</text>

  <rect class="card" x="750" y="125" width="310" height="160"/>
  <text class="subtitle" x="780" y="165">Backward Protection</text>
  <circle class="earth" cx="825" cy="222" r="34"/>
  <path d="M 804 216 C 815 205, 833 207, 845 218" stroke="#c7e4b3" stroke-width="7" fill="none"/>
  <text class="text" x="875" y="208">Protect Earth</text>
  <text class="text" x="875" y="232">from returned material</text>
  <text class="small" x="780" y="263">Restricted Earth return when hazard is possible.</text>

  <path class="arrowRed" d="M 375 205 C 394 205, 392 205, 405 205"/>
  <path class="arrowBlue" d="M 715 205 C 736 205, 735 205, 750 205"/>

  <rect class="card" x="60" y="330" width="480" height="160"/>
  <text class="subtitle" x="90" y="370">Controls for Robotic Missions</text>
  <text class="text" x="90" y="405">Categories I-V depend on target, mission type and goal.</text>
  <text class="small" x="90" y="434">Cleanroom assembly, bioburden limits, sterilisation,</text>
  <text class="small" x="90" y="456">crash probability control, organic inventory and reviews.</text>

  <rect class="card" x="580" y="330" width="480" height="160"/>
  <text class="subtitle" x="610" y="370">Human Mars Missions</text>
  <text class="text" x="610" y="405">Same planetary protection goals, harder implementation.</text>
  <text class="small" x="610" y="434">Humans carry microbiomes, hardware leaks, and crews contact</text>
  <text class="small" x="610" y="456">Martian material. Control, monitor and understand contamination.</text>

  <rect x="210" y="510" width="700" height="34" rx="17" fill="#23364a"/>
  <text x="272" y="533" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Memory line: protect the science, protect Mars, protect Earth.</text>
</svg>
