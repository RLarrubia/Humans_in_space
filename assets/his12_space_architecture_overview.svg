<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Space architecture study map</title>
  <desc id="desc">A visual summary of space architecture: destinations, extreme environment, resources, building systems, habitat envelopes, ISRU and dual-use technologies.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .card { fill: #ffffff; stroke: #cbd5df; stroke-width: 2; rx: 12; }
      .title { font: 700 34px Arial, sans-serif; fill: #17202c; }
      .subtitle { font: 700 22px Arial, sans-serif; fill: #17202c; }
      .text { font: 17px Arial, sans-serif; fill: #293647; }
      .small { font: 14px Arial, sans-serif; fill: #506073; }
      .tag { fill: #e9f0f7; stroke: #cbd5df; stroke-width: 1.5; rx: 12; }
      .tagText { font: 700 14px Arial, sans-serif; fill: #293647; }
      .planet { fill: #6f9ed6; stroke: #2f5f95; stroke-width: 3; }
      .moon { fill: #d7dde7; stroke: #6d7b8d; stroke-width: 3; }
      .hab { fill: #f0b84d; stroke: #9a6817; stroke-width: 3; }
      .green { fill: #4b8f7a; stroke: #2d5e51; stroke-width: 3; }
      .arrow { stroke: #4f647a; stroke-width: 4; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f647a"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="560"/>
  <text class="title" x="48" y="58">Lecture 12 Study Map: Space Architecture</text>
  <text class="small" x="50" y="88">Space architecture designs habitats and infrastructure for extreme, distant and resource-limited environments.</text>

  <rect class="card" x="60" y="125" width="315" height="160"/>
  <text class="subtitle" x="90" y="164">Destinations</text>
  <circle class="planet" cx="112" cy="220" r="32"/>
  <circle class="moon" cx="185" cy="220" r="18"/>
  <circle class="hab" cx="250" cy="220" r="14"/>
  <text class="small" x="90" y="272">LEO 400 km, Moon 400,000 km,</text>
  <text class="small" x="90" y="292">Mars 56-149 million km.</text>

  <rect class="card" x="405" y="125" width="315" height="160"/>
  <text class="subtitle" x="435" y="164">Extreme Environment</text>
  <text class="small" x="435" y="198">Microgravity, 1/6 g, 1/3 g</text>
  <text class="small" x="435" y="220">Temperature swings, vacuum</text>
  <text class="small" x="435" y="242">Micrometeorites and radiation</text>
  <rect class="tag" x="435" y="255" width="76" height="30"/>
  <text class="tagText" x="452" y="275">Shield</text>
  <rect class="tag" x="521" y="255" width="80" height="30"/>
  <text class="tagText" x="536" y="275">Protect</text>

  <rect class="card" x="750" y="125" width="315" height="160"/>
  <text class="subtitle" x="780" y="164">Resources</text>
  <text class="small" x="780" y="198">Air, water, food and energy are scarce.</text>
  <text class="small" x="780" y="222">Recycling and closed loops matter.</text>
  <text class="small" x="780" y="246">ISRU uses local material.</text>

  <path class="arrow" d="M 375 205 C 390 205, 390 205, 405 205"/>
  <path class="arrow" d="M 720 205 C 735 205, 735 205, 750 205"/>

  <rect class="card" x="60" y="330" width="315" height="160"/>
  <text class="subtitle" x="90" y="369">Building Systems</text>
  <rect class="hab" x="95" y="402" width="70" height="42" rx="6"/>
  <rect class="moon" x="180" y="412" width="78" height="22" rx="5"/>
  <text class="small" x="90" y="466">Habitats, shelters, storage, roads,</text>
  <text class="small" x="90" y="486">launch pads and infrastructure.</text>

  <rect class="card" x="405" y="330" width="315" height="160"/>
  <text class="subtitle" x="435" y="369">Habitat Envelope</text>
  <text class="small" x="435" y="402">Inflatable and deployable structures</text>
  <text class="small" x="435" y="424">increase volume after launch.</text>
  <text class="small" x="435" y="446">Examples: TransHab, BEAM, SHEE.</text>

  <rect class="card" x="750" y="330" width="315" height="160"/>
  <text class="subtitle" x="780" y="369">Earth Benefits</text>
  <rect class="green" x="790" y="397" width="38" height="52" rx="8"/>
  <text class="small" x="845" y="402">Closed-loop life support, robotics,</text>
  <text class="small" x="845" y="424">efficient energy and reliable systems</text>
  <text class="small" x="845" y="446">also help on Earth.</text>

  <rect x="210" y="510" width="700" height="34" rx="17" fill="#23364a"/>
  <text x="296" y="533" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Memory line: protect humans, save resources, use local material.</text>
</svg>
